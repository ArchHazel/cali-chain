defaults:
  - dataset: calib_5
  - _self_

data:
  frames_dir: data/${dataset.session}/frames

intrinsics:
  session: intrinsic_2
  dir: output/${intrinsics.session}/intrinsics
  fallback:
    fx: 1081.37
    fy: 1081.37
    cx: 959.5
    cy: 539.5

apriltag:
  family: "tag36h11"
  tag_size_m: 0.19
  undistort: true

# Anchor tag with known world pose
anchor:
  tag_id: 11
  width_m: 0.19
  height_m: 0.19
  wall_facing: "pos_x"
  measured_corner: "bottom_left"
  position_xyz: [0, 0.012, 1.2913]

# Validation tags with known world poses
# null in position_xyz = skip that axis in error computation
validation:
  - tag_id: 1
    width_m: 0.19
    height_m: 0.19
    wall_facing: "pos_y"
    measured_corner: "bottom_right"
    position_xyz: [0.0135, 0, null]

  - tag_id: 13
    width_m: 0.19
    height_m: 0.19
    wall_facing: "pos_x"
    measured_corner: "bottom_left"
    position_xyz: [0, 0.2275, 1.2913]

# Per-camera: frame to use and which tag IDs to consider
cameras:
  HAR6:
    frame: "000000.jpg"
    tags: [11, 1, 13, 0, 20, 14]
  new:
    frame: "000000.jpg"
    # tags: [10, 7, 15, 19, 16, 9, 0, 8]
    tags: [8, 15, 19, 16, 9, 0]
  HAR2:
    frame: "000000.jpg"
    tags: [15, 19, 16, 9, 18]
    # tags: [15, 19, 16, 9, 17, 18]
  HAR1:
    frame: "000000.jpg"
    tags: [18]
    # tags: [17, 18]
  HAR3:
    frame: "000000.jpg"
    tags: [16]
  HAR8:
    frame: "000000.jpg"
    # tags: [10, 7, 8]
    tags: [8]

# Solve order: each camera is solved using ALL known tags it sees,
# then all tags it detected are added to the known set.
chain:
  - HAR6
  - new
  - HAR8
  - HAR2
  - HAR3
  - HAR1

output:
  dir: output/${dataset.session}/extrinsics