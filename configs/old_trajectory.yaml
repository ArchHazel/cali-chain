defaults:
  - _self_

# Session containing 3d_joint_data.json per camera
data:
  session: calib_3
  videos_dir: data/${data.session}/videos
  joint_filename: "3d_joint_data.json"

# Cameras to process (must have entries in HAR_CAMERAS dict)
cameras:
  - HAR1
  - HAR2
  - HAR3
  - HAR6
  - HAR8

# Ground-truth waypoints for trajectory overlay (x, y in meters)
# null = no GT overlay
ground_truth:
  - [0, 1]
  - [1, 1]
  - [2, 1]
  - [2, 3.5]
  - [6, 3.5]
  - [2, 3.5]
  - [2, 6]
  - [3, 6]
  - [3, 8]
  - [3, 6]
  - [7, 6]
  - [3, 6]
  - [3, 3.5]

output:
  dir: output/${data.session}/world_trajectories_old