defaults:
  - _self_

# Reference session (has extrinsics)
reference:
  session: calib_5
  extrinsics_dir: output/${reference.session}/extrinsics
  extrinsics_filename: cam_extrinsics.json
  depth_dir: data/${reference.session}/videos

# Target session (no extrinsics — uses reference extrinsics)
target:
  session: traj_0
  depth_dir: data/${target.session}/videos

# Cameras to compare (must exist in both sessions)
cameras:
  - HAR1
  - HAR2
  - HAR3
  - HAR6
  - HAR8

depth:
  chunk: 1
  frame_idx: 0
  # Accumulate multiple frames for denser point clouds
  num_frames: 10

output:
  dir: output/cross_session_alignment