defaults:
  - _self_

environment: living_room
camera_id: new

recovery_dir: output/recovery

model:
  name: oneformer

depth:
  num_frames: 10
  max_depth: 8.0

ransac:
  distance_thresh: 0.03
  num_iterations: 2000
  min_inlier_ratio: 0.02
  max_walls: 5

# Empty list = process all segments; otherwise list specific ones
# e.g., segments: [orig, rotation_g01]
segments: []

# Set to true to reprocess already-completed segments
force: false