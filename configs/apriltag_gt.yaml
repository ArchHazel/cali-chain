defaults:
  - _self_

environment: living_room
camera_id: new

recovery_dir: output/recovery

intrinsics:
  session: intrinsic_2
  dir: output/${intrinsics.session}/intrinsics
  fallback:
    fx: 1081.37
    fy: 1081.37
    cx: 959.5
    cy: 539.5

apriltag:
  family: "tag36h11"
  tag_id: 0
  tag_size_m: 0.154
  undistort: true

# 0 = use all frames in each segment
max_frames_per_segment: 0